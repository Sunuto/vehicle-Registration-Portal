<!-- ================= UPLOAD CARD ================= -->

<label class="cursor-pointer">

    {{ field }}

    <div class="upload-box">

        <div
            id="{{ preview }}"
            class="preview-area"
        >

            <div class="preview-icon">
                {{ icon }}
            </div>

        </div>

        <h3 class="mt-4 font-semibold">
            {{ title }}
        </h3>

        <p
            id="{{ text }}"
            class="text-sm mt-2"
            style="color: var(--muted);"
        >
            Click to upload
        </p>

    </div>

</label>
